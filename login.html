<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Engineering Physics Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:opsz,wght@14..32,300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cormorant Garamond', serif; background: #0a0c10; color: #eef2f8; min-height: 100vh; }
        .navbar { background: #03070f; border-bottom: 2px solid #1e3a5f; padding: 0.9rem 2rem; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; }
        .logo h2 { font-weight: 700; font-size: 1.7rem; background: linear-gradient(135deg, #ffffff, #6c9fd1); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-links { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .nav-btn { background: transparent; border: none; font-family: 'Inter', sans-serif; padding: 0.5rem 1rem; border-radius: 30px; cursor: pointer; color: #ccdeee; }
        .nav-btn:hover, .nav-btn.active { background: #2c628f; color: white; }
        .container { max-width: 500px; margin: 3rem auto; padding: 0 1.5rem; }
        .auth-form { background: #0b111b; border-radius: 2rem; padding: 2rem; border: 1px solid #1e3a5f; }
        .auth-form h2 { margin-bottom: 1.5rem; text-align: center; }
        .input-group { margin: 1.2rem 0; }
        .input-group label { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 0.8rem; display: block; margin-bottom: 5px; color: #b8d0e8; }
        .input-group input { width: 100%; padding: 12px 16px; border-radius: 14px; border: 1px solid #2a405c; background: #03080f; color: white; font-family: 'Inter', sans-serif; font-size: 1rem; }
        .input-group input:focus { outline: none; border-color: #4c8cbb; }
        .calc-action { background: #1e3a5f; color: white; font-family: 'Inter', sans-serif; font-weight: 600; border: none; padding: 12px; border-radius: 40px; width: 100%; cursor: pointer; margin-top: 0.5rem; font-size: 1rem; }
        .calc-action:hover { background: #2c628f; }
        .switch-auth { text-align: center; margin-top: 1.2rem; font-family: 'Inter', sans-serif; font-size: 0.85rem; }
        .switch-auth span { color: #6c9fd1; cursor: pointer; font-weight: 600; }
        .message { text-align: center; margin-top: 1rem; padding: 8px; border-radius: 30px; font-family: 'Inter', sans-serif; font-size: 0.8rem; }
        .error { color: #ff9b8f; background: #3a1a1a; }
        .success { color: #8fdc9b; background: #1a3a1a; }
        footer { text-align: center; padding: 1.8rem; color: #7e95ae; border-top: 1px solid #1e3a5f; margin-top: 2rem; }
        @media (max-width: 768px) { .navbar { flex-direction: column; gap: 1rem; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><h2>Engineering Physics Lab</h2></div>
        <div class="nav-links">
            <a href="index.html"><button class="nav-btn">Home</button></a>
            <a href="resistivity.html"><button class="nav-btn">Resistivity</button></a>
            <a href="bragg.html"><button class="nav-btn">Bragg's Law</button></a>
            <a href="youngs.html"><button class="nav-btn">Young's Modulus</button></a>
            <a href="photon.html"><button class="nav-btn">Photon Energy</button></a>
            <a href="newton.html"><button class="nav-btn">Newton's Rings</button></a>
            <a href="hall.html"><button class="nav-btn">Hall Effect</button></a>
            <a href="dielectric.html"><button class="nav-btn">Dielectric</button></a>
            <a href="about.html"><button class="nav-btn">About</button></a>
            <a href="login.html"><button class="nav-btn active">Login</button></a>
        </div>
    </nav>
    <div class="container">
        <div class="auth-form" id="authContainer">
            <h2 id="formTitle">Login</h2>
            <div id="loginForm">
                <div class="input-group"><input type="email" id="loginEmail" placeholder="Email address"></div>
                <div class="input-group"><input type="password" id="loginPassword" placeholder="Password"></div>
                <button class="calc-action" onclick="handleLogin()">Sign In</button>
                <div class="switch-auth">Don't have an account? <span onclick="showRegister()">Register now</span></div>
                <div id="loginMessage" class="message"></div>
            </div>
            <div id="registerForm" style="display: none;">
                <div class="input-group"><input type="text" id="regName" placeholder="Full Name"></div>
                <div class="input-group"><input type="email" id="regEmail" placeholder="Email address"></div>
                <div class="input-group"><input type="password" id="regPassword" placeholder="Password (min 4 characters)"></div>
                <button class="calc-action" onclick="handleRegister()">Create Account</button>
                <div class="switch-auth">Already have an account? <span onclick="showLogin()">Sign in</span></div>
                <div id="registerMessage" class="message"></div>
            </div>
        </div>
    </div>
    <footer>Secure access to all physics calculators | © 2025 Engineering Physics Lab</footer>

    <script>
        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('formTitle').innerText = 'Login';
        }
        
        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('formTitle').innerText = 'Register';
        }
        
        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const messageDiv = document.getElementById('loginMessage');
            
            if (!email || !password) {
                messageDiv.innerHTML = '<span class="error">Please fill all fields</span>';
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('engiPhysUsers') || '[]');
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify({ email: user.email, name: user.name }));
                messageDiv.innerHTML = '<span class="success">Login successful! Redirecting...</span>';
                setTimeout(() => { window.location.href = 'index.html'; }, 1000);
            } else {
                messageDiv.innerHTML = '<span class="error">Invalid email or password</span>';
            }
        }
        
        function handleRegister() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const messageDiv = document.getElementById('registerMessage');
            
            if (!name || !email || !password || password.length < 4) {
                messageDiv.innerHTML = '<span class="error">Please fill all fields (password ≥ 4 chars)</span>';
                return;
            }
            
            let users = JSON.parse(localStorage.getItem('engiPhysUsers') || '[]');
            
            if (users.find(u => u.email === email)) {
                messageDiv.innerHTML = '<span class="error">User already exists! Please login.</span>';
                return;
            }
            
            users.push({ name, email, password });
            localStorage.setItem('engiPhysUsers', JSON.stringify(users));
            localStorage.setItem('currentUser', JSON.stringify({ email, name }));
            messageDiv.innerHTML = '<span class="success">Registration successful! Redirecting...</span>';
            setTimeout(() => { window.location.href = 'index.html'; }, 1000);
        }
        
        // Check if already logged in
        const currentUser = localStorage.getItem('currentUser');
        if (currentUser && window.location.pathname.includes('login.html')) {
            setTimeout(() => { window.location.href = 'index.html'; }, 500);
        }
    </script>
</body>
</html>
