<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newton's Rings | Engineering Physics Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:opsz,wght@14..32,300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cormorant Garamond', serif; background: #0a0c10; color: #eef2f8; }
        .navbar { background: #03070f; border-bottom: 2px solid #1e3a5f; padding: 0.9rem 2rem; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; }
        .logo h2 { font-weight: 700; font-size: 1.7rem; background: linear-gradient(135deg, #ffffff, #6c9fd1); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-links { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .nav-btn { background: transparent; border: none; font-family: 'Inter', sans-serif; padding: 0.5rem 1rem; border-radius: 30px; cursor: pointer; color: #ccdeee; }
        .nav-btn:hover, .nav-btn.active { background: #2c628f; color: white; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1.5rem; }
        .hero-card { background: #0b111b; border-radius: 2rem; padding: 2rem; border: 1px solid #1e3a5f; }
        .calc-card { background: #0e141f; border-radius: 1.5rem; padding: 1.5rem; margin-top: 1rem; border: 1px solid #1e3a5f; }
        .input-group { margin: 1rem 0; }
        .input-group label { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 0.8rem; display: block; margin-bottom: 5px; color: #b8d0e8; }
        .input-group input { width: 100%; padding: 10px 14px; border-radius: 14px; border: 1px solid #2a405c; background: #03080f; color: white; font-family: 'Inter', sans-serif; }
        .calc-action { background: #1e3a5f; color: white; font-family: 'Inter', sans-serif; border: none; padding: 12px; border-radius: 40px; width: 100%; cursor: pointer; margin-top: 1rem; font-weight: 600; }
        .calc-action:hover { background: #2c628f; }
        .result { margin-top: 1rem; background: #07111c; padding: 12px; border-radius: 16px; text-align: center; font-family: 'Inter', sans-serif; border: 1px solid #2a4c6e; }
        footer { text-align: center; padding: 1.8rem; color: #7e95ae; border-top: 1px solid #1e3a5f; margin-top: 2rem; }
        @media (max-width: 768px) { .navbar { flex-direction: column; gap: 1rem; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><h2>Engineering Physics Lab</h2></div>
        <div class="nav-links">
            <a href="index.html"><button class="nav-btn">Home</button></a>
            <a href="resistivity.html"><button class="nav-btn">Resistivity</button></a>
            <a href="bragg.html"><button class="nav-btn">Bragg's Law</button></a>
            <a href="youngs.html"><button class="nav-btn">Young's Modulus</button></a>
            <a href="photon.html"><button class="nav-btn">Photon Energy</button></a>
            <a href="newton.html"><button class="nav-btn active">Newton's Rings</button></a>
            <a href="hall.html"><button class="nav-btn">Hall Effect</button></a>
            <a href="dielectric.html"><button class="nav-btn">Dielectric</button></a>
            <a href="about.html"><button class="nav-btn">About</button></a>
            <a href="login.html"><button class="nav-btn">Login</button></a>
        </div>
    </nav>
    <div class="container">
        <div class="hero-card">
            <h2>Newton's Rings Experiment</h2>
            <div class="calc-card">
                <div class="input-group"><label>Ring Number (m) :</label><input type="number" id="ringNumber" placeholder="m"></div>
                <div class="input-group"><label>Wavelength λ (nm) :</label><input type="number" id="wavelength" placeholder="589"></div>
                <div class="input-group"><label>Radius of ring (mm) :</label><input type="number" id="radius" placeholder="r in mm"></div>
                <button class="calc-action" onclick="calculateNewton()">Radius of Curvature (m)</button>
                <div class="result" id="result">---</div>
            </div>
        </div>
    </div>
    <footer>Formula: rₘ² = mλR</footer>
    <script>
        function calculateNewton() {
            let m = parseFloat(document.getElementById('ringNumber').value);
            let lambda_nm = parseFloat(document.getElementById('wavelength').value);
            let r_mm = parseFloat(document.getElementById('radius').value);
            if (isNaN(m) || isNaN(lambda_nm) || isNaN(r_mm) || m === 0) {
                document.getElementById('result').innerText = "Invalid input";
                return;
            }
            let R_m = (Math.pow(r_mm / 1000, 2)) / (m * (lambda_nm * 1e-9));
            document.getElementById('result').innerHTML = `Radius of curvature R = ${R_m.toFixed(4)} m`;
        }
    </script>
</body>
</html>
